name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "priority:high"
        - "priority:medium"
        - "priority:low"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which mode were you using?
      options:
        - Piped mode (status line output)
        - TUI mode (interactive configuration)
        - Both
        - Not sure
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What's broken
      description: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - WSL
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ccstatusline version
      placeholder: "e.g., 2.2.4"

  - type: input
    id: terminal
    attributes:
      label: Terminal emulator
      placeholder: "e.g., iTerm2, WezTerm, Windows Terminal, Alacritty"

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - npx ccstatusline
        - bunx ccstatusline
        - Global install (npm i -g)
        - Self-managed (local build)

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.

  - type: textarea
    id: logs
    attributes:
      label: Error logs / screenshots
      description: Paste error messages, stack traces, or attach screenshots